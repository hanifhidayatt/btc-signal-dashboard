name: Daily BTC Data Update

on:
  schedule:
    - cron: '05 00 * * *' # Runs every day at 00:05 UTC
  workflow_dispatch: # Allows you to manually click a "Run" button in GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run feature script
        run: python src/features.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/BTC_USD_features.csv
          git commit -m "🤖 Automated daily data update" || exit 0
          git push